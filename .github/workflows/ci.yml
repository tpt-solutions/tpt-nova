name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: build+test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Linux needs system libraries for winit/wgpu (X11/Wayland, udev) to build.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev \
            libxkbcommon-dev libwayland-dev libudev-dev \
            libasound2-dev pkg-config

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  coverage:
    name: coverage (tarpaulin)
    runs-on: ubuntu-latest
    # Coverage tooling is informational; don't fail the whole pipeline if the
    # Linux-only coverage run has issues (e.g. a flaky cargo-install).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev \
            libxkbcommon-dev libwayland-dev libudev-dev \
            libasound2-dev pkg-config

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version "^0.31"

      # Establish a coverage baseline by generating an lcov report. The count of
      # covered lines is printed so regressions are visible in the job log; the
      # report is uploaded as an artifact for downstream tooling.
      - name: Run tarpaulin
        run: |
          cargo tarpaulin --workspace --out Lcov --output-dir coverage \
            --exclude-files "*/tests/*" "*/benches/*" \
            --timeout 300
          echo "## Coverage baseline (tarpaulin)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/lcov.info ]; then
            echo "lcov report generated: $(wc -l < coverage/lcov.info) lines" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
